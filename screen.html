<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>女作家特展</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- [請填入你的 Firebase 設定] ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNzDjniJp7l4NJXFkCHmMxaNNXdAx4bBI",
            authDomain: "my-exhibition-68093.firebaseapp.com",
            databaseURL: "https://my-exhibition-68093-default-rtdb.firebaseio.com",
            projectId: "my-exhibition-68093",
            storageBucket: "my-exhibition-68093.firebasestorage.app",
            messagingSenderId: "675697612488",
            appId: "1:675697612488:web:935bfd1cdc96f120f5f7fd"
        };
        // ----------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const rows = 4; // 修改為 4 列
        const cols = 4; // 修改為 4 欄
        let currentIndex = 0; 

        const answersRef = ref(db, 'answers');

        // 監聽新留言
        onChildAdded(answersRef, (snapshot) => {
            const data = snapshot.val();
            const now = Date.now();
            const threeHours = 3 * 60 * 60 * 1000;

            if (now - data.timestamp < threeHours) {
                // 傳入 snapshot.key 以便後續追蹤刪除
                displayMessage(data.name, data.answer, currentIndex, snapshot.key);
                currentIndex = (currentIndex + 1) % (rows * cols);
            }
        });

        // 加碼功能：監聽後端刪除動作 (當你在 Firebase 手動刪除，螢幕會立刻清空對應卡片)
        onChildRemoved(answersRef, (snapshot) => {
            const targetCard = document.querySelector(`[data-key="${snapshot.key}"]`);
            if (targetCard) {
                targetCard.style.opacity = '0';
                setTimeout(() => targetCard.remove(), 1000);
            }
        });

        function displayMessage(name, answer, index, key) {
            // 移除該網格位置上「舊的」卡片 (不論 key 是什麼)
            const oldCardAtGrid = document.getElementById(`grid-${index}`);
            if (oldCardAtGrid) oldCardAtGrid.remove();

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `grid-${index}`;
            card.setAttribute('data-key', key); // 綁定 Firebase 的 key

            const col = index % cols;
            const row = Math.floor(index / cols);
            
            // 16 格精確計算：寬度 25%, 高度 25%
            card.style.left = (col * 25) + '%';
            card.style.top = (row * 25) + '%';
            
            card.innerHTML = `
                <div class="answer">「${answer}」</div>
                <div class="author">— ${name}</div>
            `;
            
            document.body.appendChild(card);
        }
    </script>
    <style>
        body {
            background: #000;
            color: #fff;
            margin: 0;
            overflow: hidden;
            font-family: "Noto Serif TC", "Source Han Serif TW", serif;
            width: 100vw;
            height: 100vh;
        }
        .title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5vw;
            letter-spacing: 25px;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            white-space: nowrap;
        }
        .card {
            position: absolute;
            width: 25vw; 
            height: 25vh; 
            padding: 20px;
            box-sizing: border-box;
            border: 0.2px solid rgba(255,255,255,0.05); 
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 1s ease;
            animation: inkFade 2s ease-out;
        }
        .answer {
            font-size: 1.1rem; /* 稍微縮小字體以適應 16 格 */
            line-height: 1.6;
            margin-bottom: 8px;
            color: #d1c7b7;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .author {
            font-size: 0.75rem;
            color: #8b7e66;
            text-align: right;
            letter-spacing: 1px;
        }
        @keyframes inkFade {
            from { opacity: 0; transform: scale(0.98); filter: brightness(2); }
            to { opacity: 1; transform: scale(1); filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div class="title">女作家特展</div>
</body>
</html>
