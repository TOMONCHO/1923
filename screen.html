<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>女作家特展</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- [請填入你的 Firebase 設定 - 需與手機端一致] ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNzDjniJp7l4NJXFkCHmMxaNNXdAx4bBI",
            authDomain: "my-exhibition-68093.firebaseapp.com",
            databaseURL: "https://my-exhibition-68093-default-rtdb.firebaseio.com",
            projectId: "my-exhibition-68093",
            storageBucket: "my-exhibition-68093.firebasestorage.app",
            messagingSenderId: "675697612488",
            appId: "1:675697612488:web:935bfd1cdc96f120f5f7fd"
        };
        // ----------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const wall = document.getElementById('wall');

        // 監聽新資料加入
        const answersRef = ref(db, 'answers');
        onChildAdded(answersRef, (snapshot) => {
            const data = snapshot.val();
            displayMessage(data.name, data.answer);
        });

        function displayMessage(name, answer) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 隨機位置出現 (避免重疊太嚴重)
            const posX = Math.random() * (window.innerWidth - 300);
            const posY = Math.random() * (window.innerHeight - 200);
            
            card.style.left = posX + 'px';
            card.style.top = posY + 'px';
            
            card.innerHTML = `
                <div class="answer">「${answer}」</div>
                <div class="author">— ${name}</div>
            `;
            
            document.body.appendChild(card);

            // 隨時間自動消失或保持精簡感
            setTimeout(() => {
                card.style.opacity = '0';
                setTimeout(() => card.remove(), 2000);
            }, 15000); // 90秒後消失
        }
    </script>
    <style>
        body {
            background-color: #000; /* 深色背景更具現代感 */
            color: #fff;
            margin: 0;
            overflow: hidden;
            font-family: "PingFang TC", sans-serif;
            width: 100vw;
            height: 100vh;
        }
        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: 15px;
            color: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        .card {
            position: absolute;
            width: 300px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-left: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            animation: fadeIn 2s ease-out forwards;
            z-index: 10;
        }
        .answer {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .author {
            font-size: 0.8rem;
            color: #888;
            text-align: right;
            text-transform: uppercase;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="title">女作家特展</div>
</body>
</html>
