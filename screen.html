<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>女作家特展</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onChildAdded, onChildRemoved } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDNzDjniJp7l4NJXFkCHmMxaNNXdAx4bBI",
            authDomain: "my-exhibition-68093.firebaseapp.com",
            databaseURL: "https://my-exhibition-68093-default-rtdb.firebaseio.com",
            projectId: "my-exhibition-68093",
            storageBucket: "my-exhibition-68093.firebasestorage.app",
            messagingSenderId: "675697612488",
            appId: "1:675697612488:web:935bfd1cdc96f120f5f7fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const rows = 4;
        const cols = 4;
        let currentIndex = 0; 
        let rotationStep = 0;

        const answersRef = ref(db, 'answers');

        onChildAdded(answersRef, (snapshot) => {
            const data = snapshot.val();
            const now = Date.now();
            const threeHours = 3 * 60 * 60 * 1000;

            if (now - data.timestamp < threeHours) {
                displayMessage(data.name, data.answer, currentIndex, snapshot.key);
                currentIndex = (currentIndex + 1) % (rows * cols);
            }
        });

        onChildRemoved(answersRef, (snapshot) => {
            const targetCard = document.querySelector(`[data-key="${snapshot.key}"]`);
            if (targetCard) {
                targetCard.style.opacity = '0';
                setTimeout(() => targetCard.remove(), 1000);
            }
        });

        function displayMessage(name, answer, index, key) {
            const oldCardAtGrid = document.getElementById(`grid-${index}`);
            if (oldCardAtGrid) {
                oldCardAtGrid.remove();
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.id = `grid-${index}`;
            card.setAttribute('data-key', key);

            const col = index % cols;
            const row = Math.floor(index / cols);
            card.style.left = (col * 25) + '%';
            card.style.top = (row * 25) + '%';
            
            card.innerHTML = `
                <div class="inner-content">
                    <span class="answer">「${answer}」</span>
                    <span class="author">— ${name}</span>
                </div>
            `;
            
            document.body.appendChild(card);
        }

        setInterval(() => {
            const allContent = document.querySelectorAll('.inner-content');
            if (allContent.length === 0) return;

            rotationStep = rotationStep % allContent.length;
            const target = allContent[rotationStep];

            target.classList.remove('is-breathing');
            void target.offsetWidth; 
            target.classList.add('is-breathing');

            rotationStep++;
        }, 5000);

    </script>
    <style>
        body {
            background: #000;
            color: #fff;
            margin: 0;
            overflow: hidden;
            font-family: "Noto Serif TC", "Source Han Serif TW", serif;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .title {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5vw;
            letter-spacing: 25px;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            white-space: nowrap;
        }
        .card {
            position: absolute;
            width: 25vw; 
            height: 25vh; 
            padding: 0; 
            box-sizing: border-box;
            border: 0.1px solid rgba(255,255,255,0.03); 
            background: transparent;
            animation: inkAppear 3s ease-out forwards;
        }

        .inner-content {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 30px 45px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            
            /* 基礎縮放與渲染優化 */
            transform: scale(0.9) translateZ(0);
            backface-visibility: hidden;
            will-change: transform;
            
            transform-origin: center center;
            z-index: 1;
        }

        /* 背景光暈偽元素 */
        .inner-content::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 220px; 
            height: 220px;
            background: radial-gradient(circle, rgba(209, 199, 183, 0.5) 0%, rgba(209, 199, 183, 0) 75%);
            border-radius: 50%;
            opacity: 0;
            z-index: -1;
            transition: none; /* 徹底移除 transition 確保同步 */
            pointer-events: none;
        }

        .inner-content.is-breathing::before {
            animation: bgGlowBreath 7s ease-in-out forwards;
        }

        .inner-content.is-breathing {
            animation: textBreath 7s ease-in-out forwards;
        }

        .answer {
            display: block;
            font-size: 1.20rem;
            line-height: 1.8;
            margin-bottom: 12px;
            color: #d1c7b7;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            text-align: center;
            transform: translateZ(0);
        }
        .author {
            display: block;
            font-size: 1.0rem;
            color: #8b7e66;
            text-align: right;
            letter-spacing: 2px;
        }

        /* 背景光暈動畫：優化啟動速度 */
        @keyframes bgGlowBreath {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9) translateZ(0); 
            }
            15% {
                opacity: 1; /* 提前在 15% 時完全顯示，確保文字一動就有光 */
            }
            50% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.6) translateZ(0); 
            }
            85% {
                opacity: 1;
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.9) translateZ(0); 
            }
        }

        /* 文字呼吸動畫：與光暈縮放同步 */
        @keyframes textBreath {
            0% { 
                transform: scale(0.9) translateZ(0); 
                text-shadow: 0 0 5px rgba(209, 199, 183, 0.5);
            }
            50% { 
                transform: scale(1.1) translateZ(0); 
                text-shadow: 
                    0 0 15px rgba(255, 248, 231, 1), 
                    0 0 30px rgba(209, 199, 183, 0.8);
            }
            100% { 
                transform: scale(0.9) translateZ(0); 
                text-shadow: 0 0 5px rgba(209, 199, 183, 0.5);
            }
        }

        @keyframes inkAppear {
            0% { opacity: 0; transform: scale(0.8) translateZ(0); }
            100% { opacity: 1; transform: scale(0.9) translateZ(0); }
        }
    </style>
</head>
<body>
    <div class="title">女作家特展</div>
</body>
</html>
