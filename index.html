<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女作家特展</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- [請填入你的 Firebase 設定] ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNzDjniJp7l4NJXFkCHmMxaNNXdAx4bBI",
            authDomain: "my-exhibition-68093.firebaseapp.com",
            databaseURL: "https://my-exhibition-68093-default-rtdb.firebaseio.com",
            projectId: "my-exhibition-68093",
            storageBucket: "my-exhibition-68093.firebasestorage.app",
            messagingSenderId: "675697612488",
            appId: "1:675697612488:web:935bfd1cdc96f120f5f7fd"
        };
        // ----------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 綁定按鈕事件
        window.submitData = function() {
            const name = document.getElementById('userName').value;
            const answer = document.getElementById('userAnswer').value;
            
            if (name === "" || answer === "") {
                alert("請完整填寫");
                return;
            }

            // 推送到 Firebase
            push(ref(db, 'answers'), {
                name: name,
                answer: answer,
                timestamp: Date.now()
            }).then(() => {
                alert("成功送出！");
                document.getElementById('userAnswer').value = ""; // 清空輸入框
            });
        };
    </script>

    <style>
        body { font-family: sans-serif; background: #fff; color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 80%; max-width: 400px; text-align: center; }
        h2 { font-weight: 200; letter-spacing: 5px; }
        input, textarea { width: 100%; border: none; border-bottom: 1px solid #ccc; padding: 10px; margin: 10px 0; outline: none; }
        button { background: #000; color: #fff; padding: 10px 30px; border: none; cursor: pointer; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="step1" class="container">
        <h2>女作家特展</h2>
        <input type="text" id="userName" placeholder="請輸入使用者名稱">
        <button onclick="document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');">開始創作</button>
    </div>

    <div id="step2" class="container hidden">
        <h2>女作家特展</h2>
        <p>你認為文學創作像什麼？</p>
        <textarea id="userAnswer" rows="3"></textarea>
        <button onclick="submitData()">送出想法</button>
    </div>

</body>
</html>
