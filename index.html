<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>女作家特展</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // --- [Firebase 設定保持不變] ---
        const firebaseConfig = {
            apiKey: "AIzaSyDNzDjniJp7l4NJXFkCHmMxaNNXdAx4bBI",
            authDomain: "my-exhibition-68093.firebaseapp.com",
            databaseURL: "https://my-exhibition-68093-default-rtdb.firebaseio.com",
            projectId: "my-exhibition-68093",
            storageBucket: "my-exhibition-68093.firebasestorage.app",
            messagingSenderId: "675697612488",
            appId: "1:675697612488:web:935bfd1cdc96f120f5f7fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.submitData = function() {
            const name = document.getElementById('userName').value;
            const answer = document.getElementById('userAnswer').value;
            if (!name || !answer) { alert("請填寫名稱與回答"); return; }

            push(ref(db, 'answers'), { name, answer, timestamp: Date.now() })
            .then(() => {
                document.getElementById('cardName').innerText = name;
                document.getElementById('cardAnswer').innerText = `「${answer}」`;
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            });
        };

        window.downloadCard = function() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `文學詩籤-${document.getElementById('cardName').innerText}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };
    </script>

    <style>
        :root { --paper: #f4f0e6; --ink: #2c2c2c; --border: #d1c7b7; }
        body { font-family: "Noto Serif TC", serif; background: #e8e4d8; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--ink); }
        .container { width: 85%; max-width: 400px; text-align: center; background: #fff; padding: 40px 20px; border-radius: 2px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        h2 { font-weight: 400; letter-spacing: 6px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        /* 新增：圖片容器樣式 */
        .exhibition-image {
            width: 100%;
            height: auto;
            border-radius: 2px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        input, textarea { width: 100%; border: 1px solid #eee; padding: 12px; margin-bottom: 20px; outline: none; background: #fafafa; box-sizing: border-box; font-family: inherit; }
        button { background: var(--ink); color: #fff; padding: 14px; border: none; letter-spacing: 2px; cursor: pointer; width: 100%; font-size: 16px; transition: opacity 0.3s; }
        button:active { opacity: 0.8; }
        .hidden { display: none; }

        /* 詩籤風格設定保持不變... */
        .poem-card-wrapper { padding: 10px; background: white; margin-bottom: 20px; }
        .poem-card {
            background-color: var(--paper);
            background-image: radial-gradient(#dcd7ca 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 50px 30px;
            border: 1px solid var(--border);
            outline: 4px solid var(--paper);
            outline-offset: -12px;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }
        .poem-card::after {
            content: "";
            position: absolute;
            top: 15px; bottom: 15px; left: 15px; right: 15px;
            border: 1px solid var(--border);
            pointer-events: none;
        }
        #cardAnswer { font-size: 1.5rem; line-height: 2.2; margin-bottom: 40px; font-weight: 500; z-index: 1; color: #1a1a1a; text-align: center; }
        #cardName { font-size: 0.9rem; letter-spacing: 3px; color: #777; text-align: right; z-index: 1; border-top: 1px solid var(--border); display: inline-block; align-self: flex-end; padding-top: 5px; }
        .btn-download { background: #8b7e66; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="step1" class="container">
        <h2>女作家特展</h2>
        
        <img src="https://github.com/TOMONCHO/1923/blob/main/%E4%B8%BB%E8%A6%96%E8%A6%BA%E6%A9%AB%E5%BC%8F.jpg" 
             alt="Exhibition Visual" 
             class="exhibition-image">

        <input type="text" id="userName" placeholder="請輸入你的名稱" maxlength="10">
        <button onclick="document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');">開始創作</button>
    </div>

    <div id="step2" class="container hidden">
        <h2>女作家特展</h2>
        <p style="font-size: 15px; color: #555; margin-bottom: 20px;">你認為文學創作像什麼？</p>
        
        <textarea id="userAnswer" rows="4" 
                  placeholder="像一場沒有盡頭的旅程" 
                  maxlength="100" 
                  oninput="updateCount()"></textarea>
        
        <div id="charCount" style="text-align: right; font-size: 12px; color: #aaa; margin-top: -15px; margin-bottom: 20px;">
            0 / 100
        </div>

        <button onclick="submitData()">送出並下載我的文學詩籤</button>
    </div>

    <div id="step3" class="container hidden">
        <h2>女作家特展</h2>
        <div class="poem-card-wrapper" id="capture-area">
            <div class="poem-card">
                <div id="cardAnswer">「載入中」</div>
                <div id="cardName">署名</div>
            </div>
        </div>
        <button class="btn-download" onclick="downloadCard()">下載我的文學詩籤</button>
        <button style="background:none; color:#aaa; margin-top:15px; font-size:13px;" onclick="location.reload()">重新輸入</button>
    </div>

<script>
    function updateCount() {
        const textarea = document.getElementById('userAnswer');
        const countDisplay = document.getElementById('charCount');
        const currentLength = textarea.value.length;
        countDisplay.innerText = `${currentLength} / 100`;
        if (currentLength >= 90) {
            countDisplay.style.color = "#8b7e66";
        } else {
            countDisplay.style.color = "#aaa";
        }
    }
</script>

</body>
</html>
